<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTI Dashboard</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #0F0F0F;
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
        }
        .card {
            background-color: #1A1A1A;
            border: none;
            border-radius: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        .chart {
            width: 100%;
            height: 300px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-5">CTI Dashboard</h1>
        <div class="row">
            <div class="col-md-6">
                <div class="card p-4">
                    <h2>Animated Attack Feed Table</h2>
                    <table class="table table-dark table-striped">
                        <thead>
                            <tr>
                                <th>Source Country</th>
                                <th>Target Country</th>
                                <th>Attack Type</th>
                                <th>Severity Level</th>
                                <th>Timestamp</th>
                            </tr>
                        </thead>
                        <tbody id="attack-feed-table">
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-4">
                    <h2>Attack Type Breakdown Donut Chart</h2>
                    <canvas class="chart" id="attack-type-chart"></canvas>
                </div>
            </div>
        </div>
        <div class="row mt-5">
            <div class="col-md-6">
                <div class="card p-4">
                    <h2>Top Attacking Countries Bar Chart</h2>
                    <canvas class="chart" id="top-attacking-countries-chart"></canvas>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-4">
                    <h2>Threat Severity Gauge</h2>
                    <canvas class="chart" id="threat-severity-gauge"></canvas>
                </div>
            </div>
        </div>
        <div class="row mt-5">
            <div class="col-md-6">
                <div class="card p-4">
                    <h2>Total Attacks Counter</h2>
                    <h1 id="total-attacks-counter">0</h1>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-4">
                    <h2>Threats-Per-Minute Trend Line Chart</h2>
                    <canvas class="chart" id="threats-per-minute-chart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Simulated data generator
        function generateSimulatedData() {
            const attackTypes = ['DDoS', 'SQL Injection', 'Phishing', 'Ransomware', 'Brute Force'];
            const countries = ['USA', 'China', 'Russia', 'India', 'Brazil'];
            const severityLevels = [1, 2, 3, 4, 5];

            const simulatedData = [];
            for (let i = 0; i < 10; i++) {
                simulatedData.push({
                    sourceCountry: countries[Math.floor(Math.random() * countries.length)],
                    targetCountry: countries[Math.floor(Math.random() * countries.length)],
                    attackType: attackTypes[Math.floor(Math.random() * attackTypes.length)],
                    severityLevel: severityLevels[Math.floor(Math.random() * severityLevels.length)],
                    timestamp: new Date().toLocaleString()
                });
            }
            return simulatedData;
        }

        // Update attack feed table
        function updateAttackFeedTable(simulatedData) {
            const attackFeedTable = document.getElementById('attack-feed-table');
            attackFeedTable.innerHTML = '';
            simulatedData.forEach((attack) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${attack.sourceCountry}</td>
                    <td>${attack.targetCountry}</td>
                    <td>${attack.attackType}</td>
                    <td>${attack.severityLevel}</td>
                    <td>${attack.timestamp}</td>
                `;
                attackFeedTable.appendChild(row);
            });
        }

        // Update attack type breakdown donut chart
        function updateAttackTypeChart(simulatedData) {
            const attackTypeChart = document.getElementById('attack-type-chart').getContext('2d');
            const chart = new Chart(attackTypeChart, {
                type: 'doughnut',
                data: {
                    labels: ['DDoS', 'SQL Injection', 'Phishing', 'Ransomware', 'Brute Force'],
                    datasets: [{
                        label: 'Attack Type Breakdown',
                        data: [0, 0, 0, 0, 0],
                        backgroundColor: [
                            'rgba(255, 99, 132, 0.2)',
                            'rgba(54, 162, 235, 0.2)',
                            'rgba(255, 206, 86, 0.2)',
                            'rgba(75, 192, 192, 0.2)',
                            'rgba(153, 102, 255, 0.2)'
                        ],
                        borderColor: [
                            'rgba(255, 99, 132, 1)',
                            'rgba(54, 162, 235, 1)',
                            'rgba(255, 206, 86, 1)',
                            'rgba(75, 192, 192, 1)',
                            'rgba(153, 102, 255, 1)'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    title: {
                        display: true,
                        text: 'Attack Type Breakdown'
                    }
                }
            });

            simulatedData.forEach((attack) => {
                switch (attack.attackType) {
                    case 'DDoS':
                        chart.data.datasets[0].data[0]++;
                        break;
                    case 'SQL Injection':
                        chart.data.datasets[0].data[1]++;
                        break;
                    case 'Phishing':
                        chart.data.datasets[0].data[2]++;
                        break;
                    case 'Ransomware':
                        chart.data.datasets[0].data[3]++;
                        break;
                    case 'Brute Force':
                        chart.data.datasets[0].data[4]++;
                        break;
                }
            });
            chart.update();
        }

        // Update top attacking countries bar chart
        function updateTopAttackingCountriesChart(simulatedData) {
            const topAttackingCountriesChart = document.getElementById('top-attacking-countries-chart').getContext('2d');
            const chart = new Chart(topAttackingCountriesChart, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Top Attacking Countries',
                        data: [],
                        backgroundColor: [
                            'rgba(255, 99, 132, 0.2)',
                            'rgba(54, 162, 235, 0.2)',
                            'rgba(255, 206, 86, 0.2)',
                            'rgba(75, 192, 192, 0.2)',
                            'rgba(153, 102, 255, 0.2)'
                        ],
                        borderColor: [
                            'rgba(255, 99, 132, 1)',
                            'rgba(54, 162, 235, 1)',
                            'rgba(255, 206, 86, 1)',
                            'rgba(75, 192, 192, 1)',
                            'rgba(153, 102, 255, 1)'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    title: {
                        display: true,
                        text: 'Top Attacking Countries'
                    }
                }
            });

            const countryCounts = {};
            simulatedData.forEach((attack) => {
                if (countryCounts[attack.sourceCountry]) {
                    countryCounts[attack.sourceCountry]++;
                } else {
                    countryCounts[attack.sourceCountry] = 1;
                }
            });

            const sortedCountryCounts = Object.keys(countryCounts).sort((a, b) => countryCounts[b] - countryCounts[a]);
            chart.data.labels = sortedCountryCounts.slice(0, 5);
            chart.data.datasets[0].data = sortedCountryCounts.slice(0, 5).map((country) => countryCounts[country]);
            chart.update();
        }

        // Update threat severity gauge
        function updateThreatSeverityGauge(simulatedData) {
            const threatSeverityGauge = document.getElementById('threat-severity-gauge').getContext('2d');
            const chart = new Chart(threatSeverityGauge, {
                type: 'doughnut',
                data: {
                    labels: ['Low', 'Medium', 'High'],
                    datasets: [{
                        label: 'Threat Severity',
                        data: [0, 0, 0],
                        backgroundColor: [
                            'rgba(0, 128, 0, 0.2)',
                            'rgba(255, 165, 0, 0.2)',
                            'rgba(255, 0, 0, 0.2)'
                        ],
                        borderColor: [
                            'rgba(0, 128, 0, 1)',
                            'rgba(255, 165, 0, 1)',
                            'rgba(255, 0, 0, 1)'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    title: {
                        display: true,
                        text: 'Threat Severity'
                    }
                }
            });

            simulatedData.forEach((attack) => {
                if (attack.severityLevel <= 2) {
                    chart.data.datasets[0].data[0]++;
                } else if (attack.severityLevel <= 4) {
                    chart.data.datasets[0].data[1]++;
                } else {
                    chart.data.datasets[0].data[2]++;
                }
            });
            chart.update();
        }

        // Update total attacks counter
        function updateTotalAttacksCounter(simulatedData) {
            const totalAttacksCounter = document.getElementById('total-attacks-counter');
            totalAttacksCounter.textContent = simulatedData.length;
        }

        // Update threats-per-minute trend line chart
        function updateThreatsPerMinuteChart(simulatedData) {
            const threatsPerMinuteChart = document.getElementById('threats-per-minute-chart').getContext('2d');
            const chart = new Chart(threatsPerMinuteChart, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Threats Per Minute',
                        data: [],
                        backgroundColor: 'rgba(255, 99, 132, 0.2)',
                        borderColor: 'rgba(255, 99, 132, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    title: {
                        display: true,
                        text: 'Threats Per Minute'
                    }
                }
            });

            const timestamps = simulatedData.map((attack) => new Date(attack.timestamp).getTime());
            const threatsPerMinute = [];
            for (let i = 0; i < timestamps.length; i++) {
                const minute = Math.floor(timestamps[i] / 60000);
                if (threatsPerMinute[minute]) {
                    threatsPerMinute[minute]++;
                } else {
                    threatsPerMinute[minute] = 1;
                }
            }

            chart.data.labels = Array.from({ length: threatsPerMinute.length }, (_, i) => i);
            chart.data.datasets[0].data = threatsPerMinute;
            chart.update();
        }

        // Auto-refresh every 3 seconds
        setInterval(() => {
            const simulatedData = generateSimulatedData();
            updateAttackFeedTable(simulatedData);
            updateAttackTypeChart(simulatedData);
            updateTopAttackingCountriesChart(simulatedData);
            updateThreatSeverityGauge(simulatedData);
            updateTotalAttacksCounter(simulatedData);
            updateThreatsPerMinuteChart(simulatedData);
        }, 3000);

        // Initial update
        const simulatedData = generateSimulatedData();
        updateAttackFeedTable(simulatedData);
        updateAttackTypeChart(simulatedData);
        updateTopAttackingCountriesChart(simulatedData);
        updateThreatSeverityGauge(simulatedData);
        updateTotalAttacksCounter(simulatedData);
        updateThreatsPerMinuteChart(simulatedData);
    </script>
</body>
</html>
