# ── Complexity Router ──────────────────────────────────────────────────────────

apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: bmad-complexity-router
  title: Complexity Router
  description: >
    Scores prompt complexity 1-10 via a fast LLM call and routes to:
    Simple (1-4) → agent_system (8b model), Standard (5-7) → agent_system (70b),
    Complex (8-10) → Full BMAD pipeline.
  tags: [ai, router, bmad]
spec:
  type: library
  owner: user:guest
  lifecycle: production
  subcomponentOf: bmad-agent-system
  dependsOn:

    - component:bmad-agent-product-manager

