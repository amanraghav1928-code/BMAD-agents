# ── API ────────────────────────────────────────────────────────────────────────

apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: bmad-agent-api
  title: BMAD Agent API
  description: OpenAI-compatible REST API for the BMAD pipeline. Deployed on Railway.
  tags: [ai, rest, openai-compatible]
  links:
    - url: https://bmad-agent-api-production.up.railway.app
      title: Live API
      icon: web
    - url: https://bmad-agent-api-production.up.railway.app/traces
      title: Traces Dashboard
      icon: dashboard
spec:
  type: openapi
  owner: user:guest
  lifecycle: production
  definition: |
    openapi: "3.0.0"
    info:
      title: BMAD Agent API
      version: "1.0.0"
      description: OpenAI-compatible API wrapping the BMAD 10-agent pipeline.
    servers:
      - url: https://bmad-agent-api-production.up.railway.app
    paths:
      /health:
        get:
          summary: Health check
          responses:
            "200":
              description: OK
      /v1/chat/completions:
        post:
          summary: Run BMAD pipeline (OpenAI-compatible)
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    model:
                      type: string
                      example: bmad-agent
                    messages:
                      type: array
                      items:
                        type: object
                        properties:
                          role:
                            type: string
                          content:
                            type: string
          responses:
            "200":
              description: Pipeline result
      /v1/route:
        post:
          summary: Auto-route by complexity (1-10)
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    prompt:
                      type: string
          responses:
            "200":
              description: "{score, tier, pipeline, result}"
      /traces:
        get:
          summary: Live Langfuse traces dashboard (HTML)
          responses:
            "200":
              description: HTML dashboard

