model_list:
  # ── Tier 1: Groq llama-3.3-70b (primary) ─────────────────────────────────────
  - model_name: bmad-primary
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
      max_tokens: 8192

  # ── Tier 2: Groq llama-3.1-8b (fast fallback) ────────────────────────────────
  - model_name: bmad-fast
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY
      max_tokens: 1800

  # ── Tier 3: Cerebras (final fallback — no daily cap) ─────────────────────────
  - model_name: bmad-cerebras
    litellm_params:
      model: openai/qwen-3-235b-a22b-instruct-2507
      api_key: os.environ/CEREBRAS_API_KEY
      api_base: https://api.cerebras.ai/v1
      max_tokens: 8192

  # ── Aliases (so BMAD can call models by their original names) ─────────────────
  - model_name: llama-3.3-70b-versatile
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  - model_name: llama-3.1-8b-instant
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY

litellm_settings:
  fallbacks:
    - bmad-primary:
        - bmad-fast
        - bmad-cerebras
    - llama-3.3-70b-versatile:
        - llama-3.1-8b-instant
        - bmad-cerebras
  num_retries: 2
  request_timeout: 120
  drop_params: true
  success_callback: ["langfuse"]
  langfuse_public_key: os.environ/LANGFUSE_PUBLIC_KEY
  langfuse_secret_key: os.environ/LANGFUSE_SECRET_KEY
  langfuse_host: os.environ/LANGFUSE_HOST

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  port: 4000
